<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>NAS Downloader Settings</title>
  <style>
    :root { color-scheme: light dark; }
    body { font-family: system-ui, -apple-system, sans-serif; max-width: 560px; margin: 32px auto; padding: 0 24px; }
    h1 { font-size: 22px; margin-bottom: 4px; }
    p.sub { opacity: 0.7; margin-top: 0; }
    label { display: block; margin: 18px 0 6px; font-weight: 600; }
    input[type=text], input[type=password], input[type=number] {
      width: 100%; box-sizing: border-box; padding: 8px 10px;
      border: 1px solid rgba(127,127,127,0.4); border-radius: 6px;
      background: transparent; color: inherit; font-size: 14px;
    }
    code { background: rgba(127,127,127,0.15); padding: 1px 4px; border-radius: 3px; font-size: 12px; }
    .hint { font-size: 12px; opacity: 0.65; margin-top: 4px; }
    .row { display: flex; align-items: center; gap: 8px; margin: 14px 0; }
    .row input[type=checkbox] { margin: 0; }
    .actions { margin-top: 24px; display: flex; gap: 10px; }
    button { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
    button.primary { background: #2563eb; color: white; }
    button.primary:hover { background: #1d4ed8; }
    button.secondary { background: rgba(127,127,127,0.2); color: inherit; }
    button.secondary:hover { background: rgba(127,127,127,0.3); }
    .status { margin-top: 16px; font-size: 13px; min-height: 20px; }
    .status.ok { color: #16a34a; }
    .status.err { color: #dc2626; }
  </style>
</head>
<body>
  <h1>NAS Downloader</h1>
  <p class="sub">Forwards browser downloads to your self-hosted Rust download server.</p>

  <label for="serverUrl">Server URL</label>
  <input type="text" id="serverUrl" placeholder="http://nas.local:8787" autocomplete="off">
  <div class="hint">Base URL of your nas-downloader server. No trailing slash.</div>

  <label for="apiKey">API Key</label>
  <input type="password" id="apiKey" placeholder="paste your API key" autocomplete="off">
  <div class="hint">Must match the <code>NAS_DOWNLOADER_API_KEY</code> env var on the server.</div>

  <label for="minSizeBytes">Minimum size to forward (bytes)</label>
  <input type="number" id="minSizeBytes" min="0" step="1024" value="0">
  <div class="hint">Smaller files stay in the browser. <code>0</code> forwards everything.</div>

  <div class="row">
    <input type="checkbox" id="enabled">
    <label for="enabled" style="margin: 0;">Intercept downloads</label>
  </div>

  <div class="actions">
    <button id="save" class="primary">Save</button>
    <button id="test" class="secondary">Test connection</button>
  </div>

  <div id="status" class="status"></div>

  <script src="options.js"></script>
</body>
</html>
